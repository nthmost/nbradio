# KNOB - Remote DJ Proxy
# Exposes the Liquidsoap harbor (port 8005) externally so DJs outside
# the LAN can connect via nthmost.com:8005.
#
# Add to the nthmost.com Apache vhost that already handles /nbradio/.
# Requires: a2enmod proxy proxy_http proxy_wstunnel
#
# Option A: Dedicated Listen port (recommended for DJ clients)
# DJ clients connect to: nthmost.com:8005/live
# Most source clients (BUTT, Mixxx, etc.) expect host:port/mount.
#
# Add this OUTSIDE of <VirtualHost *:443>:
#
#   Listen 8005
#   <VirtualHost *:8005>
#       ServerName nthmost.com
#
#       # Allow SOURCE and PUT methods used by Icecast source clients
#       ProxyPass / http://10.100.0.2:8005/
#       ProxyPassReverse / http://10.100.0.2:8005/
#
#       # Long timeout for streaming connections
#       ProxyTimeout 86400
#       TimeOut 86400
#
#       # Optional: TLS (requires cert that covers nthmost.com)
#       # SSLEngine on
#       # SSLCertificateFile /path/to/cert.pem
#       # SSLCertificateKeyFile /path/to/key.pem
#   </VirtualHost>
#
# Option B: Path-based proxy on existing HTTPS vhost
# DJ clients connect to: nthmost.com:443/nbradio/live
# (Not all DJ clients support HTTPS or custom paths easily)
#
#   ProxyPass /nbradio/live http://10.100.0.2:8005/live
#   ProxyPassReverse /nbradio/live http://10.100.0.2:8005/live
#   ProxyTimeout 86400
